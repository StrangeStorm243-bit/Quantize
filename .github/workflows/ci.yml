name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    name: lint · type-check · test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Tested range. 3.14 is the CANONICAL version: it installs the committed lock (drift
        # reduction). 3.13 is a COMPATIBILITY check that resolves from pyproject constraints, because
        # a 3.14-frozen `pip freeze` is not portable across Python versions verbatim
        # (see docs/plans/M1_IMPLEMENTATION_PLAN.md §6).
        include:
          - python-version: "3.14"
            install: "pip install -r requirements.lock.txt && pip install -e . --no-deps"
          - python-version: "3.13"
            install: "pip install -e .[dev]"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          ${{ matrix.install }}
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type-check (mypy)
        run: mypy
      - name: Test (pytest)
        run: pytest
  # Node 24 LTS toolchain (TypeScript codegen) is added in M1.3; a `node` job will run there.
